<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ESPECTRE</title>
  <link rel="stylesheet" href="https://use.typekit.net/bxq7kde.css">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Espectre">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* El fons comença una mica més fosc i s'anima cap al #f0faff clar */
    html, body { 
      height: 100%; 
      overflow: hidden; 
      background: #bce0ff; 
      font-family: new-zen, sans-serif; 
      animation: bg-lighten 1.2s cubic-bezier(0.4, 0, 0.2, 1) 2.5s forwards;
    }

    .page {
      display: flex;
      flex-direction: column;
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    /* ── BLOC SUPERIOR (Logo) ── */
    .welcome__top {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      padding: 115px 24px 70px;
      position: relative;
      /* Comença desplaçat cap avall perquè quedi al centre de la pantalla */
      transform: translateY(12vh);
      animation: shift-to-top 1.2s cubic-bezier(0.4, 0, 0.2, 1) 2.5s forwards;
    }

    .welcome__illustration {
      width: 80px; height: 75px;
      background-image: url(img/logo.svg);
      background-size: cover;
      background-position: center;
      opacity: 0;
      transform: scale(0.5);
      animation: pop-in 0.8s cubic-bezier(.34,1.56,.64,1) 0.3s forwards;
    }

    .welcome__logo {
      width: 168px; height: 37px;
      background-image: url(img/espectre.svg);
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: fade-in-up 0.8s ease 0.6s forwards;
    }

    /* El text real de welcome.html que apareixerà al final */
    .welcome__tagline {
      font-size: 17px;
      color: #5a7fa0;
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
      opacity: 0;
      animation: fade-in 0.8s ease 2.7s forwards;
    }

    /* ── ANIMACIÓ DE CÀRREGA (Punts suspensius) ── */
    .loading-zone {
      position: absolute;
      top: calc(50% + 70px);
      display: flex;
      justify-content: center;
      opacity: 0;
      animation: 
        fade-in 0.5s ease 1.2s forwards,
        fade-out 0.4s ease 2.4s forwards;
    }

    .dots { display: flex; gap: 8px; }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #508bbf;
      animation: dot-pulse 0.8s infinite alternate;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }


    /* ── BLOC INFERIOR (Caixa blava) ── */
    /* La zona inferior blava és idèntica a welcome.html però arrenca amagada */
    .welcome__bottom {
      background: #d1eaff;
      padding: 64px 24px;
      margin-bottom: 200px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      opacity: 0;
      transform: translateY(15vh);
      animation: slide-up-bottom 1.2s cubic-bezier(0.4, 0, 0.2, 1) 2.5s forwards;
    }

    /* Espais buits que ocupen l'espai dels futurs botons */
    .btn-placeholder {
      height: 48px;
      width: 100%;
    }


    /* ── DEFINICIÓ DE LES ANIMACIONS ── */
    @keyframes bg-lighten {
      to { background: #f0faff; }
    }
    @keyframes shift-to-top {
      to { transform: translateY(0); }
    }
    @keyframes slide-up-bottom {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pop-in {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-in {
      to { opacity: 1; }
    }
    @keyframes fade-out {
      to { opacity: 0; visibility: hidden; }
    }
    @keyframes dot-pulse {
      0% { transform: scale(1); opacity: 0.4; }
      100% { transform: scale(1.3); opacity: 1; }
    }
  </style>
</head>
<body>

  <section class="page">
    <div class="welcome__top">
      <div class="welcome__illustration"></div>
      <div class="welcome__logo"></div>
      
      <p class="welcome__tagline">El teu espai de suport per acompanyar el teu fill o filla amb TEA.</p>
      
      <div class="loading-zone">
        <div class="dots">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    </div>

    <div class="welcome__bottom">
      <div class="btn-placeholder"></div>
      <div class="btn-placeholder"></div>
    </div>
  </section>

<script>
  /* Com que l'animació ja munta exactament la mateixa pantalla que welcome.html, 
     fem una redirecció instantània al final. Serà tan fluid que no hi haurà tall, 
     només veuràs aparèixer els botons. */
  setTimeout(() => {
    window.location.replace('pages/welcome.html');
  }, 3900);
</script>

</body>
</html>

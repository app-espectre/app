<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d1eaff">
  <title>Informe</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://use.typekit.net/bxq7kde.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="manifest" href="../manifest.json">
  
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Espectre">
</head>
<body data-page="report-gen">
<div id="app">
  <section class="page active app" id="page-report-gen">
    
    <div class="page-scroll">
      
      <div class="card mb-20">
        <h2 class="fw-black text-primary text-md mb-4">Crea un informe professional</h2>
        <p class="text-sm text-secondary">Per compartir amb metges, terapeutes i mestres.</p>
      </div>

      <h2 class="section-title">Continguts a incloure</h2>
      
      <div class="flex flex-col gap-4">
        <label class="report-section" style="cursor: pointer;">
          <div class="report-section__icon"></div>
          <div class="report-section__body">
            <div class="report-section__title">Informació bàsica</div>
            <div class="report-section__desc">Nom, edat, diagnòstic, escola</div>
          </div>
          <input type="checkbox" class="report-section__checkbox" checked>
        </label>

        <label class="report-section" style="cursor: pointer;">
          <div class="report-section__icon"></div>
          <div class="report-section__body">
            <div class="report-section__title">Progrés d'habilitats</div>
            <div class="report-section__desc">Gràfics de les 5 àrees</div>
          </div>
          <input type="checkbox" class="report-section__checkbox" checked>
        </label>

        <label class="report-section" style="cursor: pointer;">
          <div class="report-section__icon"></div>
          <div class="report-section__body">
            <div class="report-section__title">Avaluacions</div>
            <div class="report-section__desc">Puntuacions i interpretació</div>
          </div>
          <input type="checkbox" class="report-section__checkbox" checked>
        </label>

        <label class="report-section" style="cursor: pointer;">
          <div class="report-section__icon"></div>
          <div class="report-section__body">
            <div class="report-section__title">Diari d'observacions</div>
            <div class="report-section__desc">Últimes 10 anotacions</div>
          </div>
          <input type="checkbox" class="report-section__checkbox" checked>
        </label>

        <label class="report-section" style="cursor: pointer;">
          <div class="report-section__icon"></div>
          <div class="report-section__body">
            <div class="report-section__title">Recomanacions</div>
            <div class="report-section__desc">Generades automàticament</div>
          </div>
          <input type="checkbox" class="report-section__checkbox">
        </label>
      </div>

      <button class="btn btn--primary mt-24" id="btn-generate-report">Generar informe PDF</button>
      
    </div>
  </section>
</div>

  <script src="../js/state.js"></script>
  <script src="../js/shell.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>

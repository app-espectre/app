<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d1eaff">
  <title>Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://use.typekit.net/bxq7kde.css">
  <link rel="stylesheet" href="../css/style.css">

  <link rel="manifest" href="../manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Espectre">
  
</head>
<body data-page="profile-settings">
<div id="app">
  <section class="page active app" id="page-profile-settings">
      <div class="sub-top">
        <button class="back-btn" data-action="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15,18 9,12 15,6"/></svg></button>
        <h1 class="sub-top__title">Tornar</h1>
      </div>
      <div class="profile-hero">
  <div class="avatar-container">
    <div class="avatar avatar--ana""></div>
  </div>
      <div class="profile-hero__info">
        <div class="profile-hero__name" id="profile-child-name">Ana Molina</div>
        <div class="profile-hero__sub" id="profile-child-sub">Editar el teu perfil</div>
      </div>
    </div>
      <div class="page-scroll">
        <div class="profile-settings-header">
          <div class="settings-section-settings mt-6">
        <div class="settings-section__title">Informació del compte</div>
        <div class="field">
          <label class="field__label" for="profile-settings-name">Nom complet</label>
          <input class="field__input" type="text" id="profile-settings-name" placeholder="Nom complet" />
        </div>
        <div class="field">
          <label class="field__label" for="profile-settings-email">Correu electrònic</label>
          <input class="field__input" type="email" id="profile-settings-email" placeholder="Correu electrònic" />
        </div>
      </div>

      <div class="button-row mt-8">
        <button class="btn btn--primary btn--block" id="btn-save-profile-settings">Desa canvis</button>
        <button class="btn btn--outline btn--block mt-3" id="btn-cancel-profile-settings">Cancel·la</button>
      </div>
          </div>
        </div>
      </div>

      
    </div>
  </section>
</div>

<div class="modal hidden" id="avatar-modal">
  <div class="modal__backdrop" id="avatar-modal-overlay"></div>
  <div class="modal__content modal__content--sm">
    <div class="modal__header">
      <h2>Tria una imatge</h2>
      <button class="button-close" id="avatar-modal-close" aria-label="Tanca">×</button>
    </div>
    <div class="avatar-grid">
      <button type="button" class="avatar-option" data-avatar="personatge1.svg"><img src="../img/personatge1.svg" alt="Avatar 1" /></button>
      <button type="button" class="avatar-option" data-avatar="personatge2.svg"><img src="../img/personatge2.svg" alt="Avatar 2" /></button>
      <button type="button" class="avatar-option" data-avatar="personatge3.svg"><img src="../img/personatge3.svg" alt="Avatar 3" /></button>
      <button type="button" class="avatar-option" data-avatar="personatge4.svg"><img src="../img/personatge4.svg" alt="Avatar 4" /></button>
    </div>
  </div>
</div>

  <script src="../js/state.js"></script>
  <script src="../js/shell.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>

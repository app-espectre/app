<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d1eaff">
  <title>ESPECTRE – Resultats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="results">
<div id="app">
  <section class="page active app" id="page-results">
    <div class="results-hero">
      <div class="results-score">
        <span class="results-score__num" id="results-score">72%</span>
        <span class="results-score__label" id="results-area">Comunicació</span>
      </div>
      <h2 class="fw-black text-primary text-lg">Resultats d'avaluació</h2>
  <div class="alert alert--green w-full text-left">
        <span class="alert__icon">💡</span>
        <div class="alert__body">
          <div class="alert__title">Recomanació</div>
          <div class="alert__text" id="results-rec"></div>
        </div>
      </div>
    </div>
    <div class="page-scroll">
      <h2 class="section-title">Punts forts · Subcategories</h2>
      <div id="results-subs" class="flex flex-col gap-12 mb-24"></div>
      <div class="flex flex-col gap-12">
        <button class="btn btn--primary" id="btn-results-done">Guardar i tornar</button>
        <button class="btn btn--outline" id="btn-results-back">Refer l'avaluació</button>
      </div>
    </div>
  </section>
</div>

  <script src="../js/state.js"></script>
  <script src="../js/shell.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>

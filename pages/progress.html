<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d1eaff">
  <title>Progrés</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://use.typekit.net/bxq7kde.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="manifest" href="../manifest.json">
  
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Espectre">
</head>
<body data-page="progress">
<div id="app">
  <section class="page active app" id="page-progress">
    <div class="page-scroll">
      
      <div class="alert alert--yellow mb-16">
        <div class="alert__body">
          <div class="alert__title">Propera avaluació recomanada</div>
          <div class="alert__text">3 de maig de 2026</div>
        </div>
      </div>
      
      <div class="radar-chart-card mb-20">
        <h2 class="section-title mb-16">Competències actuals</h2>
        <div id="radar-chart" class="radar-chart"></div>
      </div>

      <button class="btn btn--primary mb-24" id="btn-full-assessment">Fer avaluació completa</button>

      <div class="flex flex-col gap-12 mb-24" id="progress-areas"></div>
      
      <button class="btn btn--outline mt-8" onclick="goTo('report-gen')">Generar informe PDF</button>
      
    </div>
  </section>
</div>

  <script src="../js/state.js"></script>
  <script src="../js/shell.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>

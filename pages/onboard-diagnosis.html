<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d1eaff">
  <title>Diagnòstic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://use.typekit.net/bxq7kde.css">
  <link rel="stylesheet" href="../css/style.css">

  <link rel="manifest" href="../manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Espectre">
  
</head>
<body data-page="onboard-diagnosis">
<div id="app">
  <section class="page active" id="page-onboard-diagnosis">
    <div class="auth-page-outer">
      <div>
        <div class="auth-header__title">Diagnòstic i necessitats</div>
        <div class="auth-header__sub">Podràs editar-ho en qualsevol moment.</div>
      </div>
      <div class="flex flex-col gap-20">
        <div class="field">
          <label class="field__label">Diagnòstic <span class="text-secondary text-xs">(selecció única)</span></label>
          <div class="option-chips">
            <div class="option-chip diagnosis-chip selected">TEA nivell de suport 1</div>
            <div class="option-chip diagnosis-chip">TEA nivell de suport 2</div>
            <div class="option-chip diagnosis-chip">TEA nivell de suport 3</div>
            <div class="option-chip diagnosis-chip">En procés de diagnòstic</div>
          </div>
        </div>
        <div class="field">
          <label class="field__label">Necessitats específiques <span class="text-secondary text-xs">(selecció múltiple)</span></label>
          <div class="option-chips">
            <div class="option-chip needs-chip selected">Comunicació</div>
            <div class="option-chip needs-chip">Autonomia</div>
            <div class="option-chip needs-chip selected">Sensorial</div>
            <div class="option-chip needs-chip selected">Social</div>
            <div class="option-chip needs-chip">Aprenentatge</div>
            <div class="option-chip needs-chip">Conductual</div>
          </div>
        </div>
      </div>
      <div class="flex flex-col gap-12">
        <button class="btn btn--primary" id="btn-onboard-diag">Continua</button>
        <button class="btn btn--ghost" onclick="goTo('home')">Fer-ho més tard</button>
      </div>
    </div>
  </section>
</div>

  <script src="../js/state.js"></script>
  <script src="../js/shell.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>

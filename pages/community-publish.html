<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d1eaff">
  <title>Publicar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://use.typekit.net/bxq7kde.css">
  <link rel="stylesheet" href="../css/style.css">

  <link rel="manifest" href="../manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Espectre">
  
</head>
<body data-page="community-publish">
<div id="app">
  <section class="page active app" id="page-community-publish">
    <div class="sub-top">
      <button class="back-btn" data-action="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15,18 9,12 15,6"/></svg></button>
      <h1 class="sub-top__title">Publicar</h1>
      <button class="sub-top__action" id="btn-publish">Publicar</button>
    </div>
    <div class="page-scroll">
      <div class="flex flex-col gap-16">
        <div class="field"><label class="field__label" for="publish-title">Títol (opcional)</label><input class="field__input" id="publish-title" type="text" placeholder="Títol de la publicació"></div>
        <div class="field">
          <label class="field__label" for="publish-msg">Missatge</label>
          <textarea class="field__textarea textarea-tall" id="publish-msg" placeholder="Escriu la teva publicació..."></textarea>
          <div class="field__char-count" id="publish-char-count">0/1000 caràcters</div>
        </div>
  <div class="card card--header-bg">
          <p class="text-xs fw-bold text-secondary mb-4">Normes de conducta</p>
          <p class="text-xs text-secondary">Mantén un to respectuós. Les publicacions estan subjectes a moderació.</p>
        </div>
      </div>
    </div>
  </section>
</div>

  <script src="../js/state.js"></script>
  <script src="../js/shell.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>

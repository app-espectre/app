<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d1eaff">
  <title>ESPECTRE – Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="profile-view">
<div id="app">
  <section class="page active app" id="page-profile-view">
    <div class="profile-hero">
  <div class="avatar avatar--xl avatar--accent" id="profile-child-avatar">M</div>
      <div class="profile-hero__info">
        <div class="profile-hero__name" id="profile-child-name">Martina</div>
        <div class="profile-hero__sub" id="profile-child-sub">7 anys · TEA nivell 1</div>
        <div class="profile-hero__actions">
          <button class="btn btn--outline btn--sm btn--auto" onclick="goTo('profile-edit')">Editar</button>
        </div>
      </div>
    </div>
    <nav class="tab-bar">
      <button class="tab-btn active" id="tab-btn-info">Info</button>
      <button class="tab-btn" id="tab-btn-diary">Diari</button>
      <button class="tab-btn" id="tab-btn-skills">Habilitats</button>
    </nav>
    <div class="page-scroll">
      <div id="profile-tab-info"></div>
      <div id="profile-tab-diary" class="hidden"></div>
      <div id="profile-tab-skills" class="hidden"></div>
    </div>
  </section>
</div>

  <script src="../js/state.js"></script>
  <script src="../js/shell.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d1eaff">
  <title>ESPECTRE – Professionals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://use.typekit.net/bxq7kde.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="professionals">
<div id="app">
  <section class="page active app" id="page-professionals">
    <div class="page-header"><h1 class="page-header__title">Professionals</h1></div>
    <div class="page-scroll">
      <div class="search-bar mb-16">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Cerca per nom, especialitat, ubicació...">
      </div>
      <div class="filter-row mb-16">
        <div class="filter-chip">Tipus <select><option>Tots</option><option>Psicòleg/a</option><option>Logopeda</option><option>Terapeuta ocupacional</option></select></div>
        <div class="filter-chip">Zona <select><option>BCN</option><option>Sarrià</option><option>Gràcia</option></select></div>
        <div class="filter-chip">Modalitat <select><option>Tots</option><option>Presencial</option><option>Online</option></select></div>
      </div>
      <div id="professionals-list" class="flex flex-col gap-12"></div>
    </div>
  </section>
</div>

  <script src="../js/state.js"></script>
  <script src="../js/shell.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>

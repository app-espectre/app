<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d1eaff">
  <title>ESPECTRE – Registre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="register">
<div id="app">
  <section class="page active" id="page-register">
    <div class="auth-page-outer">
      <div class="auth-header">
        <div class="auth-header__title">Crea el teu compte</div>
        <div class="auth-header__sub">És gratuït i triga un minut.</div>
        <div class="circulo" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
      <div class="auth-content">
        <div class="flex flex-col gap-16">
        <div class="field"><label class="field__label" for="reg-name">Nom i cognoms</label><input class="field__input" id="reg-name" type="text" placeholder="Ana Molina Reyes"></div>
        <div class="field"><label class="field__label" for="reg-email">Correu electrònic</label><input class="field__input" id="reg-email" type="email" placeholder="exemple@gmail.com"></div>
        <div class="field"><label class="field__label" for="reg-pass">Contrasenya</label><input class="field__input" id="reg-pass" type="password" placeholder="•••••••• (mínim 8 caràcters)"></div>
        <div class="field"><label class="field__label" for="reg-pass2">Confirmar contrasenya</label><input class="field__input" id="reg-pass2" type="password" placeholder="••••••••"></div>
        <div class="checkbox-row"><input type="checkbox" id="reg-terms" checked><label for="reg-terms">He llegit i accepto els <a href="#">Termes d'ús</a> i la <a href="#">Política de privacitat</a>.</label></div>
      </div>
      <button class="btn btn--primary" id="btn-register-submit">Crear compte</button>
      <p class="auth-footer-link">Ja tens compte? <button id="link-to-login">Inicia sessió</button></p>
    </div>
  </section>
</div>

  <script src="../js/state.js"></script>
  <script src="../js/shell.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d1eaff">
  <title>Comunitat</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://use.typekit.net/bxq7kde.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="manifest" href="../manifest.json">
  
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Espectre">
</head>
<body data-page="community-chat">
<div id="app">
  <section class="page active app" id="page-community-chat">
    
    <div class="sub-top">
      <button class="back-btn" data-action="back" aria-label="Tornar enrere">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15,18 9,12 15,6"/></svg>
      </button>
      
      <div class="group-card__icon" role="button" tabindex="0" aria-label="Veure informació del grup" onclick="document.getElementById('group-info-modal').style.display='flex'" style="background-image: url('../img/grup1.jpg'); width: 38px; height: 38px; cursor: pointer;">
      </div>      
      
      <div class="flex-1">
        <div class="sub-top__title">Primer diagnòstic</div>
        <div class="text-xs text-secondary">234 membres</div>
      </div>
    </div>

    <div id="chat-messages" class="page-scroll flex flex-col gap-12"></div>
    
    <div class="chat-input-bar">
      <input class="chat-input-bar__field" id="chat-input" type="text" placeholder="Escriu un missatge...">
      <button class="chat-input-bar__send" id="btn-send-chat" aria-label="Enviar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
      </button>
    </div>

    <div id="group-info-modal" class="group-modal-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="modal-group-title">
      <div class="group-modal-content text-center" style="background: #d1eaff;">
        <button class="group-modal-close" aria-label="Tancar" onclick="document.getElementById('group-info-modal').style.display='none'">✕</button>
        <img src="../img/grup1.jpg" alt="Imatge del grup Primer diagnòstic" style="width: 180px; height: 180px; object-fit: cover; margin: 24px auto 24px; border: 2px solid var(--color-accent); border-radius: 50%;">
        <h2 id="modal-group-title" class="sub-top__title mb-8" style="font-size: 20px;">Primer diagnòstic</h2>
        <p class="text-sm text-secondary mb-24" style="line-height: 1.5;">Grup de suport per a famílies que acaben de rebre el diagnòstic de TEA. Aquí compartim dubtes, recursos útils i les nostres experiències inicials per ajudar-nos mútuament.</p>
      </div>
    </div>

  </section>
</div>

  <script src="../js/state.js"></script>
  <script src="../js/shell.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>

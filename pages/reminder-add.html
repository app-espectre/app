<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d1eaff">
  <title>ESPECTRE – Nou recordatori</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">

  <link rel="manifest" href="../manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Espectre">
  
</head>
<body data-page="reminder-add">
<div id="app">
  <section class="page active app" id="page-reminder-add">
    <div class="sub-top">
      <button class="back-btn" data-action="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15,18 9,12 15,6"/></svg></button>
      <h1 class="sub-top__title">Nou recordatori</h1>
    </div>
    <div class="page-scroll">
      <div class="flex flex-col gap-20">
        <div class="field"><label class="field__label" for="reminder-title">Títol</label><input class="field__input" id="reminder-title" type="text" placeholder="Sessió de logopèdia"></div>
        <div class="field">
          <label class="field__label">Tipus</label>
          <div class="reminder-types">
            <button class="reminder-type-btn" data-type="Teràpia">Teràpia</button>
            <button class="reminder-type-btn" data-type="Cita mèdica">Cita mèdica</button>
            <button class="reminder-type-btn" data-type="Medicació">Medicació</button>
            <button class="reminder-type-btn" data-type="Escola">Escola</button>
          </div>
        </div>
        <div class="field"><label class="field__label" for="reminder-time">Hora</label><input class="field__input" id="reminder-time" type="time" value="15:00"></div>
        <div class="field">
          <label class="field__label">Repetició</label>
          <select class="field__select"><option>Mai</option><option>Setmanal</option><option>Quinzenal</option><option>Mensual</option></select>
        </div>
        <div class="flex flex-col gap-12 mt-8">
          <button class="btn btn--primary" id="btn-save-reminder">Desar recordatori</button>
          <button class="btn btn--ghost" data-action="back">Cancel·lar</button>
        </div>
      </div>
    </div>
  </section>
</div>

  <script src="../js/state.js"></script>
  <script src="../js/shell.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d1eaff">
  <title>Recordatoris</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://use.typekit.net/bxq7kde.css">
  <link rel="stylesheet" href="../css/style.css">

  <link rel="manifest" href="../manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Espectre">
  
</head>
<body data-page="reminders">
<div id="app">
  <section class="page active app" id="page-reminders">
    <div class="page-scroll">
      <h2 class="section-title">Calendari</h2>
      <div class="mini-calendar mb-20">
        <div class="mini-calendar__header">
          <span class="mini-calendar__title">Abril 2026</span>
          <div class="flex gap-8">
            <button class="btn--icon text-secondary" data-action="prev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15,18 9,12 15,6"/></svg></button>
            <button class="btn--icon text-secondary" data-action="next"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9,18 15,12 9,6"/></svg></button>
          </div>
        </div>
        <div class="mini-calendar__grid" id="calendar-grid"></div>
      </div>
      <h2 class="section-title">Propers recordatoris</h2>
      <div id="reminders-list" class="flex flex-col gap-12"></div>
    </div>
    <button class="fab" id="fab" aria-label="Afegir recordatori">+</button>
  </section>
</div>

  <script src="../js/state.js"></script>
  <script src="../js/shell.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>

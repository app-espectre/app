<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d1eaff">
  <title>ESPECTRE – Editar perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">

  <link rel="manifest" href="../manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Espectre">
  
</head>
<body data-page="profile-edit">
<div id="app">
  <section class="page active app" id="page-profile-edit">
    <div class="sub-top">
      <button class="back-btn" data-action="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15,18 9,12 15,6"/></svg></button>
      <h1 class="sub-top__title">Editar perfil</h1>
    </div>
    <div class="page-scroll">
      <div class="flex justify-center mb-24">
        <div class="avatar avatar--xl avatar--accent">M</div>
      </div>
      <div class="flex flex-col gap-16">
        <div class="field"><label class="field__label" for="edit-name">Nom i cognoms de l'infant</label><input class="field__input" id="edit-name" type="text" value="Martina Molina Reyes"></div>
        <div class="field"><label class="field__label" for="edit-birth">Data de neixement</label><input class="field__input" id="edit-birth" type="date" value="2018-03-15"></div>
        <div class="field">
          <label class="field__label">Diagnòstic</label>
          <select class="field__select"><option selected>TEA nivell de suport 1</option><option>TEA nivell de suport 2</option><option>TEA nivell de suport 3</option><option>En procés de diagnòstic</option></select>
        </div>
      </div>
      <div class="flex flex-col gap-12 mt-24">
        <button class="btn btn--primary" id="btn-save-profile">Desar canvis</button>
  <button class="btn btn--danger opacity-70" id="btn-delete-profile">Eliminar perfil</button>
      </div>
    </div>
  </section>
</div>

  <script src="../js/state.js"></script>
  <script src="../js/shell.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>

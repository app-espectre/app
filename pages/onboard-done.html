<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d1eaff">
  <title>ESPECTRE – Tot a punt!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="onboard-done">
<div id="app">
  <section class="page active" id="page-onboard-done">
    <div class="onboard-done__wrap">
      <div class="onboard-done__check">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00943a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>
      </div>
      <h1 class="onboard-done__title">Tot a punt!</h1>
      <p class="onboard-done__sub">El perfil de la Martina ja està creat. Comença a explorar ESPECTRE!</p>
      <div class="onboard-done__card">
        <div class="onboard-done__row"><span class="onboard-done__key">Nom</span><span class="onboard-done__val">Martina</span></div>
        <div class="onboard-done__row"><span class="onboard-done__key">Edat</span><span class="onboard-done__val">7 anys</span></div>
        <div class="onboard-done__row"><span class="onboard-done__key">Diagnòstic</span><span class="onboard-done__val">TEA nivell 1</span></div>
        <div class="onboard-done__row"><span class="onboard-done__key">Necessitats</span><span class="onboard-done__val">Comunicació, Sensorial, Social</span></div>
      </div>
      <p class="onboard-done__note">Podràs editar el perfil en qualsevol moment</p>
      <button class="btn btn--primary w-full" id="btn-explore">Explorar ESPECTRE</button>
    </div>
  </section>
</div>

  <script src="../js/state.js"></script>
  <script src="../js/shell.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>

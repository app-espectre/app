<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#d1eaff">
  <title>Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://use.typekit.net/bxq7kde.css">
  <link rel="stylesheet" href="../css/style.css">

  <link rel="manifest" href="../manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Espectre">
  
</head>
<body data-page="profile-note">
<div id="app">
  <section class="page active app" id="page-profile-note">
    <div class="sub-top">
      <button class="back-btn" data-action="back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15,18 9,12 15,6"/></svg></button>
      <h1 class="sub-top__title">Tornar</h1>
    </div>
    <div class="page-scroll">
      <div class="flex flex-col gap-20">
        <div class="field">
          <label class="field__label">Tipus d'anotació</label>
          <div class="note-type-btns">
            <button class="note-type-btn" data-type="achievement">Assoliment</button>
            <button class="note-type-btn" data-type="difficulty">Dificultat</button>
            <button class="note-type-btn" data-type="change">Canvi</button>
            <button class="note-type-btn" data-type="note">Nota</button>
          </div>
        </div>
        <div class="field">
          <label class="field__label" for="note-text">Descripció</label>
          <textarea class="field__textarea" id="note-text" placeholder="Descriu l'observació..."></textarea>
          <div class="field__char-count" id="note-char-count">0/500 caràcters</div>
        </div>
        <div class="flex flex-col gap-12">
          <button class="btn btn--primary" id="btn-save-note">Desar anotació</button>
          <button class="btn btn--ghost" id="btn-cancel-note">Cancel·lar</button>
        </div>
      </div>
    </div>
  </section>
</div>

  <script src="../js/state.js"></script>
  <script src="../js/shell.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
